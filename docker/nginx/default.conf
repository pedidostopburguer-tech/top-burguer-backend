# Zonas de rate limiting (precisam ficar no contexto http, fora do server{})
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    index index.php;
    server_name _;
    root /var/www/public;
    client_max_body_size 20M;

    # Limite mais estrito para login/registro (proteção contra brute-force)
    location ~ ^/api/v1/auth/(login|register|password) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Limite geral para o restante da API
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    location ~ /\.ht { deny all; }
}
