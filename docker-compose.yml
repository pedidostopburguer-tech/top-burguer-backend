services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tb_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - tb_network
    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: tb_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tb_network
    depends_on:
      - app

  pgsql:
    image: postgres:16-alpine
    container_name: tb_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: top_burguer
      POSTGRES_USER: top_burguer
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - tb_pgsql_data:/var/lib/postgresql/data
    networks:
      - tb_network

  redis:
    image: redis:7-alpine
    container_name: tb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tb_redis_data:/data
    networks:
      - tb_network

networks:
  tb_network:
    driver: bridge

volumes:
  tb_pgsql_data:
  tb_redis_data:
